name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.1). Leave empty for snapshot build.'
        required: false
        type: string
      create_release:
        description: 'Create a GitHub Release?'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Cache Android NDK
        uses: actions/cache@v4
        id: cache-ndk
        with:
          path: /opt/ndk/r27c
          key: ndk-r27c-linux

      - name: Set up Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Restore NDK path
        if: steps.cache-ndk.outputs.cache-hit == 'true'
        run: echo "NDK_PATH=/opt/ndk/r27c" >> "$GITHUB_ENV"

      - name: Set NDK path from install
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          NDK_SRC="${{ steps.setup-ndk.outputs.ndk-path }}"
          NDK_DST="/opt/ndk/r27c"
          mkdir -p "$(dirname "$NDK_DST")"
          cp -a "$NDK_SRC" "$NDK_DST"
          echo "NDK_PATH=$NDK_DST" >> "$GITHUB_ENV"

      - name: Cache CMake
        uses: actions/cache@v4
        id: cache-cmake
        with:
          path: /opt/cmake
          key: cmake-3.25-linux

      - name: Set up CMake
        if: steps.cache-cmake.outputs.cache-hit != 'true'
        uses: jwlawson/actions-setup-cmake@v2
        id: setup-cmake
        with:
          cmake-version: '3.25.x'

      - name: Cache CMake installation
        if: steps.cache-cmake.outputs.cache-hit != 'true'
        run: |
          CMAKE_BIN="$(which cmake)"
          CMAKE_DIR="$(dirname "$(dirname "$CMAKE_BIN")")"
          mkdir -p /opt/cmake
          cp -a "$CMAKE_DIR/." /opt/cmake/

      - name: Add CMake to PATH
        if: steps.cache-cmake.outputs.cache-hit == 'true'
        run: echo "/opt/cmake/bin" >> "$GITHUB_PATH"

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=snapshot-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch Dobby ARM64 assembly for ELF
        run: |
          # Dobby's closure_bridge_arm64.asm uses Apple Mach-O @PAGE/@PAGEOFF
          # relocations which are invalid on ELF targets (Android/Linux).
          # Replace with ELF-compatible AArch64 syntax:
          #   @PAGE     -> (removed, ADRP handles ELF relocations implicitly)
          #   @PAGEOFF  -> #:lo12: (ELF low-12-bit relocation modifier)
          ASM_FILE="third_party/dobby/source/TrampolineBridge/ClosureTrampolineBridge/arm64/closure_bridge_arm64.asm"
          if [ -f "$ASM_FILE" ]; then
            sed -i 's/@PAGE//g; s/@PAGEOFF/#:lo12:/g' "$ASM_FILE"
            echo "Patched $ASM_FILE for ELF compatibility"
            grep -n 'adrp\|add.*lo12' "$ASM_FILE"
          else
            echo "Warning: $ASM_FILE not found"
          fi

      - name: Build for arm64-v8a
        run: |
          cmake -B build/arm64-v8a \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_PATH }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -S .
          cmake --build build/arm64-v8a -j$(nproc)

      - name: Build for armeabi-v7a
        run: |
          cmake -B build/armeabi-v7a \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_PATH }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -S .
          cmake --build build/armeabi-v7a -j$(nproc)

      - name: Build for x86_64
        run: |
          cmake -B build/x86_64 \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_PATH }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -S .
          cmake --build build/x86_64 -j$(nproc)

      - name: Verify 16KB page alignment
        run: |
          for abi in arm64-v8a armeabi-v7a x86_64; do
            so="build/${abi}/out/lib/${abi}/libbreeze_api.so"
            align=$(readelf -l "${so}" | grep LOAD | head -1 | awk '{print $NF}')
            echo "${abi}: alignment=${align}"
          done

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp build/arm64-v8a/out/lib/arm64-v8a/libbreeze_api.so release/libbreeze_api_arm64-v8a.so
          cp build/armeabi-v7a/out/lib/armeabi-v7a/libbreeze_api.so release/libbreeze_api_armeabi-v7a.so
          cp build/x86_64/out/lib/x86_64/libbreeze_api.so release/libbreeze_api_x86_64.so

          # Copy public headers
          mkdir -p release/include
          cp include/breeze_api.h release/include/
          cp include/hook_manager.h release/include/
          cp include/symbol_resolver.h release/include/
          cp include/logger.h release/include/

          # Create zip
          cd release
          zip -r ../breeze_api_${{ steps.version.outputs.tag }}.zip .
          cd ..

          # Print checksums
          echo "## Checksums" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          sha256sum release/libbreeze_api_*.so >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: breeze_api_${{ steps.version.outputs.tag }}
          path: |
            release/libbreeze_api_*.so
            release/include/

      - name: Create GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.create_release == true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: BreezeAPI ${{ steps.version.outputs.tag }}
          body: |
            BreezeAPI ${{ steps.version.outputs.tag }}

            ## Downloads
            - `breeze_api_${{ steps.version.outputs.tag }}.zip` - All ABIs + headers
            - `libbreeze_api_arm64-v8a.so` - ARM64 (device, 16KB page aligned)
            - `libbreeze_api_armeabi-v7a.so` - ARM32 (legacy device)
            - `libbreeze_api_x86_64.so` - x86_64 (emulator)

            ## 16KB Page Size Support
            All shared libraries are compiled with 16KB page alignment, compatible with Android 15+ devices that use 16KB page sizes.

            ## Usage
            See [API Reference](docs/API.md) for detailed documentation.
          draft: false
          prerelease: false
          files: |
            breeze_api_${{ steps.version.outputs.tag }}.zip
            release/libbreeze_api_arm64-v8a.so
            release/libbreeze_api_armeabi-v7a.so
            release/libbreeze_api_x86_64.so
