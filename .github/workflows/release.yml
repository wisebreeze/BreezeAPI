name: Build and Release

on:
  push:
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.1). Leave empty for snapshot build.'
        required: false
        type: string
      create_release:
        description: 'Create a GitHub Release?'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.25.x'

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=snapshot-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build for arm64-v8a
        run: |
          cmake -B build/arm64-v8a \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -S .
          cmake --build build/arm64-v8a -j$(nproc)

      - name: Build for armeabi-v7a
        run: |
          cmake -B build/armeabi-v7a \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -S .
          cmake --build build/armeabi-v7a -j$(nproc)

      - name: Build for x86_64
        run: |
          cmake -B build/x86_64 \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -S .
          cmake --build build/x86_64 -j$(nproc)

      - name: Verify 16KB page alignment
        run: |
          for abi in arm64-v8a armeabi-v7a x86_64; do
            so="build/${abi}/out/lib/${abi}/libbreeze_api.so"
            align=$(readelf -l "${so}" | grep LOAD | head -1 | awk '{print $NF}')
            echo "${abi}: alignment=${align}"
          done

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp build/arm64-v8a/out/lib/arm64-v8a/libbreeze_api.so release/libbreeze_api_arm64-v8a.so
          cp build/armeabi-v7a/out/lib/armeabi-v7a/libbreeze_api.so release/libbreeze_api_armeabi-v7a.so
          cp build/x86_64/out/lib/x86_64/libbreeze_api.so release/libbreeze_api_x86_64.so

          # Copy public headers
          mkdir -p release/include
          cp include/breeze_api.h release/include/
          cp include/hook_manager.h release/include/
          cp include/symbol_resolver.h release/include/
          cp include/logger.h release/include/

          # Create zip
          cd release
          zip -r ../breeze_api_${{ steps.version.outputs.tag }}.zip .
          cd ..

          # Print checksums
          echo "## Checksums" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          sha256sum release/libbreeze_api_*.so >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: breeze_api_${{ steps.version.outputs.tag }}
          path: |
            release/libbreeze_api_*.so
            release/include/

      - name: Create GitHub Release
        if: ${{ github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.create_release == true) }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: BreezeAPI ${{ steps.version.outputs.tag }}
          body: |
            BreezeAPI ${{ steps.version.outputs.tag }}

            ## Downloads
            - `breeze_api_${{ steps.version.outputs.tag }}.zip` - All ABIs + headers
            - `libbreeze_api_arm64-v8a.so` - ARM64 (device, 16KB page aligned)
            - `libbreeze_api_armeabi-v7a.so` - ARM32 (legacy device)
            - `libbreeze_api_x86_64.so` - x86_64 (emulator)

            ## 16KB Page Size Support
            All shared libraries are compiled with 16KB page alignment, compatible with Android 15+ devices that use 16KB page sizes.

            ## Usage
            See [API Reference](docs/API.md) for detailed documentation.
          draft: false
          prerelease: false
          files: |
            breeze_api_${{ steps.version.outputs.tag }}.zip
            release/libbreeze_api_arm64-v8a.so
            release/libbreeze_api_armeabi-v7a.so
            release/libbreeze_api_x86_64.so
