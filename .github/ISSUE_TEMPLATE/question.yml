name: Question
description: Ask a question about BreezeAPI usage or integration
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question about using BreezeAPI? Please check [docs/API.md](docs/API.md) first, then describe your question below.

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: Describe what you are trying to do and where you are stuck.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include relevant code, build configuration, or error messages.
      render: cpp
